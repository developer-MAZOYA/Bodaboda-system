services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: bodaboda-mqtt
    restart: unless-stopped
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "1883:1883"
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bodaboda-net]

  postgres:
    image: postgres:16-alpine
    container_name: bodaboda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bodaboda_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Crosshood@442}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [bodaboda-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bodaboda-backend:latest
    container_name: bodaboda-backend
    restart: unless-stopped
    depends_on:
      mqtt:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Remove defaults - let Spring Boot pick up from Render's environment
      - SPRING_DATASOURCE_URL
      - SPRING_DATASOURCE_USERNAME
      - SPRING_DATASOURCE_PASSWORD
      - JWT_SECRET
      - MQTT_BROKER_URI
      - MQTT_RIDE_REQUEST_TOPIC
      - SERVER_PORT
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks: [bodaboda-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    image: bodaboda-frontend:latest
    container_name: bodaboda-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [bodaboda-net]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bodaboda-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks: [bodaboda-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: bodaboda-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks: [bodaboda-net]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: bodaboda-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-Crosshood@442}@postgres:5432/${POSTGRES_DB:-bodaboda_db}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"
    networks: [bodaboda-net]

  grafana:
    image: grafana/grafana:latest
    container_name: bodaboda-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks: [bodaboda-net]

volumes:
  postgres_data:
  pgadmin_data:
  grafana_data:

networks:
  bodaboda-net:
    driver: bridge