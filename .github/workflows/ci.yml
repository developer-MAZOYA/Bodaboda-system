name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # GitHub Actions: force JS actions runtime to Node 24 to avoid Node 20 deprecation issues
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests (JUnit + Mockito)
        working-directory: backend
        run: mvn -B test
      - name: Build JAR
        working-directory: backend
        run: mvn -B -DskipTests package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Build Docker images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        run: docker build -t bodaboda-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t bodaboda-frontend:ci ./frontend
      - name: Compose config sanity check
        run: docker compose -f docker-compose.yml config
      - name: Staging compose config sanity check
        env:
          REGISTRY: ghcr.io/example
          IMAGE_TAG: ci
          JWT_SECRET: ci-secret-key-that-is-long-enough-for-hs256
        run: docker compose -f deployment/staging/docker-compose.yml config
      - name: Production compose config sanity check
        env:
          REGISTRY: ghcr.io/example
          IMAGE_TAG: ci
          JWT_SECRET: ci-secret-key-that-is-long-enough-for-hs256
        run: docker compose -f deployment/production/docker-compose.yml config
