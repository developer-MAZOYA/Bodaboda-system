name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  MQTT_RIDE_REQUEST_TOPIC: ride/request

jobs:
  publish-images:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-backend
          tags: |
            type=raw,value=latest
            type=raw,value=v1
            type=sha

      - name: Extract Docker metadata (frontend)
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=v1
            type=sha

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}


  deploy-staging:
    name: Deploy to Staging (Render)
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate staging compose with MQTT broker
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: latest
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
        run: docker compose -f deployment/staging/docker-compose.yml config

      - name: Trigger MQTT broker deployment
        env:
          RENDER_STAGING_MQTT_WEBHOOK: ${{ secrets.RENDER_STAGING_MQTT_WEBHOOK }}
        run: |
          if [ -n "$RENDER_STAGING_MQTT_WEBHOOK" ]; then
            curl -f --max-time 30 -X POST "$RENDER_STAGING_MQTT_WEBHOOK"
          else
            echo "RENDER_STAGING_MQTT_WEBHOOK is not set; skipping."
          fi

      - name: Trigger Render deployment and capture deploy ID
        id: trigger-staging
        run: |
          HTTP_CODE=$(curl --max-time 30 -s \
            -o /tmp/render_response.json \
            -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys")
          RESPONSE=$(cat /tmp/render_response.json)
          echo "HTTP Code: $HTTP_CODE"
          echo "API Response: $RESPONSE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "Render API call failed with HTTP $HTTP_CODE"
            exit 1
          fi
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // .[0].id // empty')
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "Failed to extract deploy ID from response: $RESPONSE"
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Triggered staging deploy: $DEPLOY_ID"

      - name: Wait for Render deployment to complete
        run: |
          DEPLOY_ID="${{ steps.trigger-staging.outputs.deploy_id }}"
          echo "Polling deploy: $DEPLOY_ID"
          for i in $(seq 1 45); do
            RESPONSE=$(curl --max-time 15 -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_SERVICE_ID }}/deploys/$DEPLOY_ID")
            echo "Raw response ($i/45): $RESPONSE"
            STATUS=$(echo "$RESPONSE" | jq -r '.deploy.status // .status // empty')
            echo "Deploy status ($i/45): $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Staging deployment is live."
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Staging deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for staging deployment"
          exit 1

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              https://${{ secrets.RENDER_STAGING_URL }}/actuator/health/liveness || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for healthy response... ($i/10) - HTTP $HTTP_CODE"
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

  deploy-production:
    name: Deploy to Production (Render)
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record automated promotion
        run: |
          echo "### Automated production promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "Staging passed, so production deployment started without a manual approval delay." >> "$GITHUB_STEP_SUMMARY"

      - name: Validate production compose with MQTT broker
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: v1
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
        run: docker compose -f deployment/production/docker-compose.yml config

      - name: Trigger MQTT broker deployment
        env:
          RENDER_PROD_MQTT_WEBHOOK: ${{ secrets.RENDER_PROD_MQTT_WEBHOOK }}
        run: |
          if [ -n "$RENDER_PROD_MQTT_WEBHOOK" ]; then
            curl -f --max-time 30 -X POST "$RENDER_PROD_MQTT_WEBHOOK"
          else
            echo "RENDER_PROD_MQTT_WEBHOOK is not set; skipping."
          fi

      - name: Trigger Render deployment and capture deploy ID
        id: trigger-production
        run: |
          HTTP_CODE=$(curl --max-time 30 -s \
            -o /tmp/render_response.json \
            -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys")
          RESPONSE=$(cat /tmp/render_response.json)
          echo "HTTP Code: $HTTP_CODE"
          echo "API Response: $RESPONSE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "Render API call failed with HTTP $HTTP_CODE"
            exit 1
          fi
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // .[0].id // empty')
          if [ -z "$DEPLOY_ID" ] || [ "$DEPLOY_ID" = "null" ]; then
            echo "Failed to extract deploy ID from response: $RESPONSE"
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Triggered production deploy: $DEPLOY_ID"

      - name: Wait for Render deployment to complete
        run: |
          DEPLOY_ID="${{ steps.trigger-production.outputs.deploy_id }}"
          echo "Polling deploy: $DEPLOY_ID"
          for i in $(seq 1 45); do
            RESPONSE=$(curl --max-time 15 -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_PROD_SERVICE_ID }}/deploys/$DEPLOY_ID")
            echo "Raw response ($i/45): $RESPONSE"
            STATUS=$(echo "$RESPONSE" | jq -r '.deploy.status // .status // empty')
            echo "Deploy status ($i/45): $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Production deployment is live."
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ]; then
              echo "Production deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for production deployment"
          exit 1

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              https://${{ secrets.RENDER_PROD_URL }}/actuator/health/liveness || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed! (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for healthy response... ($i/10) - HTTP $HTTP_CODE"
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1
      - name: Deployment failure summary
        if: failure()
        run: |
          echo "### Production deployment failed" >> "$GITHUB_STEP_SUMMARY"
          echo "Check Render deploy logs, backend health, and MQTT broker status. For self-hosted Docker deployments, run deployment/scripts/deploy.sh with PREVIOUS_IMAGE_TAG set to restore the last known-good image." >> "$GITHUB_STEP_SUMMARY"
