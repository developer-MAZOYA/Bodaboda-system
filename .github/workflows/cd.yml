name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-images:
    name: Publish Docker Images
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-backend:latest
      
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-frontend:latest

  deploy-staging:
    name: Deploy to Staging (Render)
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_WEBHOOK }}"
      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://${{ secrets.RENDER_STAGING_URL }}/actuator/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for service to be ready... ($i/30)"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1

  approval:
    name: 🔒 Release Manager Approval
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production-manager-approval
    steps:
      - run: echo "Approved by Release Manager. Proceeding to production."

  deploy-production:
    name: Deploy to Production (Render)
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_WEBHOOK }}"
      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://${{ secrets.RENDER_PROD_URL }}/actuator/health; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for service to be ready... ($i/30)"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1