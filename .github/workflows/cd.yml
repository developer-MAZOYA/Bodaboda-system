name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish-images:
    # Your existing publish-images job stays EXACTLY the same
    # It builds and pushes to GHCR - this already works!

  deploy-staging:
    name: Deploy to Staging (Render)
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_WEBHOOK }}"
      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS https://${{ secrets.RENDER_STAGING_URL }}/actuator/health; then exit 0; fi
            sleep 5
          done
          exit 1

  approval:
    name: 🔒 Release Manager Approval
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production-manager-approval
    steps:
      - run: echo "Approved by Release Manager. Proceeding to production."

  deploy-production:
    name: Deploy to Production (Render)
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_WEBHOOK }}"
      - name: Health check
        run: |
          for i in $(seq 1 20); do
            if curl -fsS https://${{ secrets.RENDER_PROD_URL }}/actuator/health; then exit 0; fi
            sleep 5
          done
          exit 1