name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  MQTT_RIDE_REQUEST_TOPIC: ride/request

jobs:
  publish-images:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-backend
          tags: |
            type=raw,value=latest
            type=raw,value=v1
            type=sha

      - name: Extract Docker metadata (frontend)
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/bodaboda-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=v1
            type=sha

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}


  deploy-staging:
    name: Deploy to Staging (Render)
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate staging compose with MQTT broker
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: latest
          JWT_SECRET: ci-secret-key-that-is-long-enough-for-hs256
        run: docker compose -f deployment/staging/docker-compose.yml config
      
      - name: Trigger MQTT broker deployment
        env:
          RENDER_STAGING_MQTT_WEBHOOK: ${{ secrets.RENDER_STAGING_MQTT_WEBHOOK }}
        run: |
          if [ -n "$RENDER_STAGING_MQTT_WEBHOOK" ]; then
            curl -X POST "$RENDER_STAGING_MQTT_WEBHOOK"
          else
            echo "RENDER_STAGING_MQTT_WEBHOOK is not set; skipping separate MQTT broker webhook."
          fi
      
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_WEBHOOK }}"
      
      - name: Health check
        run: |
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.RENDER_STAGING_URL }}/ || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "503" ]; then
              echo "Health check passed! Service is responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for service to be ready... ($i/30) - HTTP $HTTP_CODE"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1


  approval:
    name: 🔒 Release Manager Approval
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production-manager-approval
    steps:
      - run: echo "Approved by Release Manager. Proceeding to production."


  deploy-production:
    name: Deploy to Production (Render)
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate production compose with MQTT broker
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE_TAG: v1
          JWT_SECRET: ci-secret-key-that-is-long-enough-for-hs256
        run: docker compose -f deployment/production/docker-compose.yml config
      
      - name: Trigger MQTT broker deployment
        env:
          RENDER_PROD_MQTT_WEBHOOK: ${{ secrets.RENDER_PROD_MQTT_WEBHOOK }}
        run: |
          if [ -n "$RENDER_PROD_MQTT_WEBHOOK" ]; then
            curl -X POST "$RENDER_PROD_MQTT_WEBHOOK"
          else
            echo "RENDER_PROD_MQTT_WEBHOOK is not set; skipping separate MQTT broker webhook."
          fi
      
      - name: Trigger Render deployment
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_WEBHOOK }}"
      
      - name: Health check
        run: |
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.RENDER_PROD_URL }}/ || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "503" ]; then
              echo "Health check passed! Service is responding (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Waiting for service to be ready... ($i/30) - HTTP $HTTP_CODE"
            sleep 10
          done
          echo "Health check failed after 30 attempts"
          exit 1