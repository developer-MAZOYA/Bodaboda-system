services:
  mqtt:
    image: eclipse-mosquitto:2
    command: mosquitto -c /mosquitto-no-auth.conf
    ports: ["1883:1883"]
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t healthcheck -m ready"]
      interval: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bodaboda}
      POSTGRES_USER: ${POSTGRES_USER:-bodaboda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bodaboda}
    volumes: [pg_staging:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bodaboda}"]
      interval: 10s

  backend:
    image: ${REGISTRY}/bodaboda-backend:${IMAGE_TAG:-latest}
    depends_on:
      mqtt: { condition: service_healthy }
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bodaboda}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bodaboda}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bodaboda}
      JWT_SECRET: ${JWT_SECRET}
      MQTT_BROKER_URI: tcp://mqtt:1883
      MQTT_RIDE_REQUEST_TOPIC: ${MQTT_RIDE_REQUEST_TOPIC:-ride/request}
      SPRING_PROFILES_ACTIVE: staging
    ports: ["8080:8080"]

  frontend:
    image: ${REGISTRY}/bodaboda-frontend:${IMAGE_TAG:-latest}
    depends_on: [backend]
    ports: ["3000:80"]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ${MONITORING_DIR:-./../../monitoring}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [backend]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-bodaboda}:${POSTGRES_PASSWORD:-bodaboda}@postgres:5432/${POSTGRES_DB:-bodaboda}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["3002:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ${MONITORING_DIR:-./../../monitoring}/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]

volumes:
  pg_staging:
  grafana_data:
