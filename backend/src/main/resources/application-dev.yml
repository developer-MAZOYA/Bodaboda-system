spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/bodaboda_db
    username: bodaboda
    password: bodaboda
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
  sql:
    init:
      mode: never

server:
  port: 8080

app:
  jwt:
    secret: dev-secret-key-for-local-development-only-32char+
    expiration-ms: 86400000
  mqtt:
    enabled: true
    broker-uri: tcp://localhost:1883
    ride-request-topic: ride/request

logging:
  level:
    root: INFO
    com.bodaboda: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE